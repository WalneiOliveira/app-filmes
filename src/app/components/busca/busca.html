<mat-form-field appearance="outline">
  <mat-icon matPrefix>search</mat-icon>
  <input matInput placeholder="Buscar filme..." #termoBusca (keyup.enter)="emitirBusca(termoBusca.value)" />
  <button matSuffix mat-icon-button (click)="emitirBusca(termoBusca.value)">
    <mat-icon>arrow_forward</mat-icon>
  </button>
</mat-form-field>
