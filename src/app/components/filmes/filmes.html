<app-busca (termoBuscado)="buscar($event)" />

<div class="filmes-grid">
  @if(carregando()) {
  <mat-spinner></mat-spinner>
  } @else { @for(filme of filmesPaginados(); track filme.id) {
  <mat-card>
    <img
      mat-card-image
      [src]="imageBaseUrl + filme.poster_path"
      [alt]="filme.title"
    />
    <mat-card-header>
      <mat-card-title>{{ filme.title }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>{{ resumir(filme.overview) }}</mat-card-content>
    <span [style.background]="corDaNota(filme.vote_average)" class="nota-badge">
      ⭐ {{ filme.vote_average | number:'1.1-1' }}
    </span>
  </mat-card>
  } }
</div>
<div class="container-paginator">
  <mat-paginator
    [length]="totalResultados()"
    [pageSize]="itensPorPagina()"
    [pageIndex]="paginaAtual() - 1"
    [pageSizeOptions]="[5, 10, 20]"
    (page)="mudarPagina($event)"
    aria-label="Selecionar página"
  >
  </mat-paginator>
</div>
